<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EscalaFácil / TurniLavoro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222638;--border:#2e3347;--accent:#f5c518;--accent2:#4d9fff;--accent3:#3ecf8e;--danger:#ff5c5c;--text:#e8eaf0;--text2:#8b90a8;--text3:#5a5f75;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;line-height:1.6}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-text{font-size:20px;font-weight:700;letter-spacing:-.5px}
.logo-sub{font-size:12px;color:var(--text2)}
.lang-switcher{display:flex;gap:6px}
.lang-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;border:2px solid var(--border);background:transparent;color:var(--text2);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.lang-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.lang-btn.active{background:var(--accent);border-color:var(--accent);color:#000}
.container{max-width:960px;margin:0 auto;padding:32px 20px 80px}
.steps{display:flex;gap:8px;margin-bottom:32px;overflow-x:auto;padding-bottom:4px}
.step{flex:1;min-width:110px;padding:12px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;text-align:center}
.step.active{background:var(--accent);border-color:var(--accent);color:#000}
.step.done{border-color:var(--accent3);color:var(--accent3)}
.step-num{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:.7}
.step-label{font-size:12px;font-weight:600;margin-top:2px}
.panel{display:none;animation:fadeIn .3s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.card-title{font-size:18px;font-weight:600;margin-bottom:6px}
.card-desc{color:var(--text2);font-size:14px;margin-bottom:20px}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:48px 24px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(245,197,24,.05)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:48px;margin-bottom:12px}
.upload-text{font-size:18px;font-weight:600;margin-bottom:6px}
.upload-hint{font-size:13px;color:var(--text2)}
.upload-status{margin-top:16px;padding:12px 16px;background:rgba(62,207,142,.1);border:1px solid var(--accent3);border-radius:8px;color:var(--accent3);font-size:14px;font-weight:500;display:none}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border:none;border-radius:8px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#ffd633;transform:translateY(-1px)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-success{background:var(--accent3);color:#000}
.btn-success:hover{background:#5fffa8}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-lg{padding:16px 32px;font-size:17px}
input[type=text],select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:inherit;font-size:15px;width:100%;transition:border-color .2s}
input[type=text]:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent2)}
label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase}
.form-group{margin-bottom:16px}
.legend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.legend-code{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;color:var(--accent);min-width:28px;text-align:center}
.legend-input{flex:1;padding:4px 8px;font-size:13px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text)}
.legend-input:focus{outline:none;border-color:var(--accent2)}
.name-list{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.name-chip{padding:10px 18px;background:var(--surface2);border:2px solid var(--border);border-radius:30px;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s}
.name-chip:hover{border-color:var(--accent2);color:var(--accent2)}
.name-chip.selected{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.schedule-table{width:100%;border-collapse:collapse;font-size:14px;margin-top:12px}
.schedule-table th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);border-bottom:1px solid var(--border)}
.schedule-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.schedule-table tr:last-child td{border-bottom:none}
.schedule-table tr:hover td{background:rgba(255,255,255,.02)}
.day-num{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:18px;color:var(--accent2)}
.day-name{color:var(--text2);font-size:13px}
.shift-code{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:16px;color:var(--accent);padding:4px 10px;background:rgba(245,197,24,.1);border-radius:6px;display:inline-block}
.shift-time{font-weight:500;font-size:15px}
.tag-rest{padding:3px 10px;background:rgba(139,144,168,.15);border-radius:20px;font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.export-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:16px}
.export-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:all .2s}
.export-card:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:var(--shadow)}
.export-icon{font-size:36px;margin-bottom:10px}
.export-name{font-weight:600;font-size:15px}
.export-desc{font-size:12px;color:var(--text2);margin-top:4px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:24px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.alert{padding:14px 18px;border-radius:8px;font-size:14px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.alert-info{background:rgba(77,159,255,.1);border:1px solid rgba(77,159,255,.3);color:var(--accent2)}
.alert-success{background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);color:var(--accent3)}
.alert-warn{background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.3);color:var(--accent)}
.nav-actions{display:flex;gap:12px;justify-content:space-between;margin-top:24px;flex-wrap:wrap}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-title{font-size:20px;font-weight:700;margin-bottom:8px}
.modal-body{color:var(--text2);font-size:15px;margin-bottom:24px;white-space:pre-line}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.loading{display:none;text-align:center;padding:40px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.history-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;transition:border-color .2s}
.history-item:hover{border-color:var(--accent2)}
.history-info{flex:1}
.history-name{font-weight:600}
.history-meta{font-size:12px;color:var(--text2);margin-top:2px}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.badge-yellow{background:rgba(245,197,24,.15);color:var(--accent)}
.badge-blue{background:rgba(77,159,255,.15);color:var(--accent2)}
.manual-section{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.manual-section h4{font-size:14px;color:var(--text2);margin-bottom:10px}
.highlight-row td{background:rgba(245,197,24,.04)!important}
@media(max-width:600px){
  .steps{gap:4px}.step{min-width:80px;padding:8px 6px}.step-label{font-size:10px}
  .export-grid{grid-template-columns:1fr 1fr}.btn-lg{padding:14px 20px;font-size:15px}
  .lang-btn .lang-label{display:none}
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">📅</div>
    <div>
      <div class="logo-text" id="logoText">EscalaFácil</div>
      <div class="logo-sub" id="logoSub">Importador de Escala de Trabalho</div>
    </div>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" id="btnPT" onclick="setLang('pt')"><span>🇧🇷</span><span class="lang-label"> Português</span></button>
    <button class="lang-btn" id="btnIT" onclick="setLang('it')"><span>🇮🇹</span><span class="lang-label"> Italiano</span></button>
  </div>
</header>
<div class="container">
  <div class="steps" id="stepsBar"></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:20%"></div></div>

  <!-- STEP 1 -->
  <div class="panel active" id="panel-1">
    <div class="card">
      <div class="card-title" id="t-s1-title"></div>
      <div class="card-desc" id="t-s1-desc"></div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="pdfFile" accept=".pdf" onchange="handlePDFUpload(this)">
        <div class="upload-icon">📄</div>
        <div class="upload-text" id="t-upload-text"></div>
        <div class="upload-hint" id="t-upload-hint"></div>
      </div>
      <div class="upload-status" id="uploadStatus"></div>
      <div class="loading" id="pdfLoading"><div class="spinner"></div><div id="t-loading"></div></div>
    </div>
    <div class="card">
      <div class="card-title" id="t-manual-title"></div>
      <div class="card-desc" id="t-manual-desc"></div>
      <div class="form-group"><label id="t-manual-label"></label><textarea id="manualText" rows="8"></textarea></div>
      <div class="form-group">
        <label id="t-month-label"></label>
        <input type="month" id="scheduleMonth" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:inherit;font-size:15px;width:auto">
      </div>
      <button class="btn btn-secondary" onclick="parseManualText()" id="t-process-btn"></button>
    </div>
    <div class="card" id="historyCard" style="display:none">
      <div class="card-title" id="t-history-title"></div>
      <div id="historyList"></div>
    </div>
    <div class="nav-actions"><span></span><button class="btn btn-primary" onclick="goToStep(2)" id="t-next1"></button></div>
  </div>

  <!-- STEP 2 -->
  <div class="panel" id="panel-2">
    <div class="card">
      <div class="card-title" id="t-s2-title"></div>
      <div class="card-desc" id="t-s2-desc"></div>
      <div class="alert alert-info">ℹ️ <span id="t-s2-alert"></span></div>
      <div id="legendGrid" class="legend-grid"></div>
      <div class="manual-section">
        <h4 id="t-add-code-label"></h4>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input type="text" id="newCode" style="width:80px">
          <input type="text" id="newTime" style="flex:1;min-width:160px">
          <button class="btn btn-secondary" onclick="addLegendItem()" id="t-add-btn"></button>
        </div>
      </div>
    </div>
    <div class="nav-actions">
      <button class="btn btn-secondary" onclick="goToStep(1)" id="t-back2"></button>
      <button class="btn btn-primary" onclick="goToStep(3)" id="t-next2"></button>
    </div>
  </div>

  <!-- STEP 3 -->
  <div class="panel" id="panel-3">
    <div class="card">
      <div class="card-title" id="t-s3-title"></div>
      <div class="card-desc" id="t-s3-desc"></div>
      <div id="noNamesAlert" class="alert alert-warn" style="display:none">⚠️ <span id="t-no-names"></span></div>
      <div class="form-group"><label id="t-search-label"></label><input type="text" id="nameSearch" oninput="filterNames(this.value)"></div>
      <div class="name-list" id="nameList"></div>
      <div class="manual-section">
        <h4 id="t-add-name-label"></h4>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input type="text" id="manualName" style="flex:1">
          <button class="btn btn-secondary" onclick="addManualName()" id="t-add-name-btn"></button>
        </div>
      </div>
    </div>
    <div class="nav-actions">
      <button class="btn btn-secondary" onclick="goToStep(2)" id="t-back3"></button>
      <button class="btn btn-primary" id="btnToStep4" onclick="goToStep(4)" disabled></button>
    </div>
  </div>

  <!-- STEP 4 -->
  <div class="panel" id="panel-4">
    <div class="card">
      <div class="card-title">📋 <span id="t-s4-title"></span> <span id="selectedNameDisplay">—</span></div>
      <div class="card-desc" id="scheduleSubtitle"></div>
      <div id="scheduleStats" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px"></div>
      <div style="overflow-x:auto">
        <table class="schedule-table">
          <thead><tr><th id="t-th-day"></th><th id="t-th-weekday"></th><th id="t-th-code"></th><th id="t-th-time"></th></tr></thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </div>
      <div id="noScheduleMsg" class="alert alert-warn" style="display:none;margin-top:16px">⚠️ <span id="t-no-schedule"></span></div>
    </div>
    <div class="nav-actions">
      <button class="btn btn-secondary" onclick="goToStep(3)" id="t-back4"></button>
      <button class="btn btn-primary btn-lg" onclick="goToStep(5)" id="t-next4"></button>
    </div>
  </div>

  <!-- STEP 5 -->
  <div class="panel" id="panel-5">
    <div class="card">
      <div class="card-title" id="t-s5-title"></div>
      <div class="card-desc" id="t-s5-desc"></div>
      <div class="alert alert-success">✅ <span id="exportSummary"></span></div>
      <div class="export-grid">
        <div class="export-card" onclick="exportICS()"><div class="export-icon">📥</div><div class="export-name" id="t-exp1-name"></div><div class="export-desc" id="t-exp1-desc"></div></div>
        <div class="export-card" onclick="exportGoogleCalendar()"><div class="export-icon">🗓️</div><div class="export-name">Google Calendar</div><div class="export-desc" id="t-exp2-desc"></div></div>
        <div class="export-card" onclick="copyToClipboard()"><div class="export-icon">📋</div><div class="export-name" id="t-exp3-name"></div><div class="export-desc" id="t-exp3-desc"></div></div>
        <div class="export-card" onclick="printSchedule()"><div class="export-icon">🖨️</div><div class="export-name" id="t-exp4-name"></div><div class="export-desc" id="t-exp4-desc"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title" id="t-ics-info-title"></div>
      <div style="font-size:14px;color:var(--text2);line-height:1.9" id="t-ics-info-body"></div>
    </div>
    <div class="nav-actions">
      <button class="btn btn-secondary" onclick="goToStep(4)" id="t-back5"></button>
      <button class="btn btn-success btn-lg" onclick="exportICS()" id="t-dl-btn"></button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

function handlePDFUpload(inp){const f=inp.files[0];if(f)processPDF(f);}
async function processPDF(file){
  document.getElementById('pdfLoading').style.display='block';
  document.getElementById('uploadStatus').style.display='none';
  try{
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let txt='';
    for(let i=1;i<=pdf.numPages;i++){
      const pg=await pdf.getPage(i);
      const ct=await pg.getTextContent();
      txt+=ct.items.map(x=>x.str).join(' ')+'\n';
    }
    document.getElementById('manualText').value=txt;
    detectMonth(txt);
    parseSchedule(txt);
    document.getElementById('pdfLoading').style.display='none';
    const s=document.getElementById('uploadStatus');
    s.style.display='block';
    s.textContent=`✅ PDF lido! (${pdf.numPages} ${t('pages')}) — ${allNames.length} ${t('workers')}`;
    document.getElementById('uploadZone').querySelector('.upload-text').textContent='✅ '+file.name;
  }catch(err){
    document.getElementById('pdfLoading').style.display='none';
    showModal(t('attention'),t('errPDF')+err.message);
  }
}
function detectMonth(text){
  const all=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre',
             'janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const low=text.toLowerCase();
  all.forEach((m,i)=>{
    if(low.includes(m)){
      const idx=i%12;
      const y=(text.match(/20\d{2}/)||[new Date().getFullYear()])[0];
      document.getElementById('scheduleMonth').value=`${y}-${String(idx+1).padStart(2,'0')}`;
    }
  });
}
function parseManualText(){
  const txt=document.getElementById('manualText').value;
  if(!txt.trim()){showModal(t('attention'),t('emptyText'));return;}
  parseSchedule(txt);
  showModal('✅',t('processed').replace('{n}',allNames.length));
}

// ── PARSER ────────────────────────────────────────────────────────
// Handles the flat token-stream format produced by PDF.js from table-style schedules:
// "01-mar 02-mar ... Dom Lun ... NAME1 CODE CODE ... NAME2 CODE CODE ..."
function parseSchedule(text){
  rawScheduleData={};allNames=[];

  const WD=/^(dom|lun|mar|mer|gio|ven|sab|sun|mon|tue|wed|thu|fri|sat|seg|ter|qua|qui|sex)$/i;
  const DHDR=/^\d{1,2}[-\/](mar|apr|mag|giu|lug|ago|set|ott|nov|dic|gen|feb|jan|may|jun|jul|aug|sep|oct|dec)$/i;
  // shift code: 1-2 uppercase letters + optional digit, NOT a common word
  const SCODE=/^(RL|ST|FE|G[12]?|F[12]?|K[12]?|C[12]?|N[12]?|Q[12]?|S[12]?|E[12]?|O[12]?|P[12]?|R[12]?|T[12]?|U[12]?|D[12]?|H[12]?|I[12]?|L[12]?|M[12]?|B[12]?|V|W|X|Y|Z|J)$/;
  // name token: all letters (incl accented), length >= 2, NOT a shift code, NOT a weekday
  function isName(s){return /^[A-Z\u00C0-\u024F']{2,}$/.test(s)&&!SCODE.test(s)&&!WD.test(s)&&!DHDR.test(s);}

  const tokens=text.split(/\s+/).filter(Boolean);

  // Find day-header start
  let hStart=-1;
  for(let i=0;i<tokens.length-10;i++){if(DHDR.test(tokens[i])){hStart=i;break;}}

  if(hStart>=0){
    // Collect day numbers from header
    let dayNums=[],i=hStart;
    while(i<tokens.length&&(DHDR.test(tokens[i])||(/^\d{1,2}$/.test(tokens[i])&&parseInt(tokens[i])>=1&&parseInt(tokens[i])<=31))){
      const m=tokens[i].match(/^(\d{1,2})/);if(m)dayNums.push(parseInt(m[1]));i++;
    }
    const numDays=dayNums.length;
    if(numDays<20){allNames=[];rawScheduleData={};}
    else{
      // Skip weekday row
      let j=i;
      const wdSlice=tokens.slice(j,j+numDays+3);
      if(wdSlice.filter(tk=>WD.test(tk)).length>numDays*0.4)j+=wdSlice.filter(tk=>WD.test(tk)).length;

      // Parse employee rows
      while(j<tokens.length){
        const tk=tokens[j];
        if(DHDR.test(tk)||WD.test(tk)||/^(MARZO|APRILE|MAGGIO|GIUGNO|LUGLIO|AGOSTO|SETTEMBRE|OTTOBRE|NOVEMBRE|DICEMBRE|GENNAIO|FEBBRAIO|JANUARY|FEBRUARY|MARCH|APRIL|JUNE|JULY|AUGUST|SEPTEMBER|OCTOBER|NOVEMBER|DECEMBER)$/i.test(tk)){j++;continue;}
        // Read name (1-4 tokens)
        let nameTks=[],k=j;
        while(k<tokens.length&&nameTks.length<4&&isName(tokens[k])){nameTks.push(tokens[k]);k++;}
        if(!nameTks.length){j++;continue;}
        // Read codes
        let codes=[],skip=0;
        while(k<tokens.length&&codes.length<numDays){
          const c=tokens[k].toUpperCase();
          if(WD.test(c)||DHDR.test(c)){k++;skip++;if(skip>3)break;continue;}
          if(/^[A-Z]{1,2}\d?$/.test(c)){codes.push(c);k++;}
          else break;
        }
        if(codes.length>=Math.floor(numDays*0.6)){
          const name=nameTks.join(' ');
          if(!rawScheduleData[name]){rawScheduleData[name]={};allNames.push(name);}
          codes.forEach((code,idx)=>{const day=dayNums[idx];if(day&&day>=1&&day<=31)rawScheduleData[name][String(day)]=code;});
          j=k;
        }else{j++;}
      }
    }
  }

  // Fallback: line-by-line "NAME\n01 A 02 B..."
  if(!allNames.length){
    const lines=text.split(/\n|\r/).map(l=>l.trim()).filter(Boolean);
    let cur=null;
    for(const line of lines){
      const tks=line.split(/\s+/);
      if(tks.every(tk=>/^[A-Z\u00C0-\u024F']+$/.test(tk))&&tks.join('').length>3&&!tks.some(tk=>SCODE.test(tk))){
        cur=line.toUpperCase().trim();
        if(!rawScheduleData[cur]){rawScheduleData[cur]={};allNames.push(cur);}
      }else if(cur){
        const p=/(\d{1,2})\s*[-\/]?\s*([A-Z]{1,2}\d?)/g;let m;
        while((m=p.exec(line))!==null){const d=parseInt(m[1]);if(d>=1&&d<=31)rawScheduleData[cur][String(d)]=m[2].toUpperCase();}
      }
    }
  }

  allNames=[...new Set(allNames)];
  renderNameList();saveHistory();
}

// ── SCHEDULE ──────────────────────────────────────────────────────
function buildSchedule(){
  if(!selectedName)return;
  const mv=document.getElementById('scheduleMonth').value;
  let year,month;
  if(mv){[year,month]=mv.split('-').map(Number);}else{const n=new Date();year=n.getFullYear();month=n.getMonth()+1;}
  const dim=new Date(year,month,0).getDate();
  const pd=rawScheduleData[selectedName]||{};
  const WD=t('weekdays');
  selectedSchedule=[];
  for(let d=1;d<=dim;d++){
    const dt=new Date(year,month-1,d);
    const code=pd[String(d)]||null;
    selectedSchedule.push({day:d,date:`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`,weekday:WD[dt.getDay()],isSun:dt.getDay()===0,code,time:code?(legend[code]||null):null,isRest:code&&FOLGA.includes(code),year,month});
  }
  renderScheduleTable(year,month);
}
function renderScheduleTable(year,month){
  const body=document.getElementById('scheduleBody');
  const MONTHS=t('months');
  document.getElementById('selectedNameDisplay').textContent=selectedName;
  const work=selectedSchedule.filter(s=>s.code&&!s.isRest&&s.time).length;
  const rest=selectedSchedule.filter(s=>s.isRest).length;
  const unk=selectedSchedule.filter(s=>s.code&&!s.time&&!s.isRest).length;
  document.getElementById('scheduleSubtitle').textContent=`${MONTHS[month-1]} ${year} — ${work} ${t('shifts')}`;
  document.getElementById('scheduleStats').innerHTML=
    `<span class="badge badge-blue">📅 ${MONTHS[month-1]} ${year}</span>`+
    `<span class="badge badge-yellow">⚡ ${work} ${t('shifts')}</span>`+
    (rest?`<span class="badge" style="background:rgba(139,144,168,.15);color:var(--text2)">🏖️ ${rest} ${t('rest').toLowerCase()}</span>`:'')+
    (unk?`<span class="badge" style="background:rgba(255,92,92,.15);color:var(--danger)">⚠️ ${unk} ${t('unknown')}</span>`:'');
  if(!work&&!rest){document.getElementById('noScheduleMsg').style.display='flex';body.innerHTML='';return;}
  document.getElementById('noScheduleMsg').style.display='none';
  body.innerHTML='';
  selectedSchedule.forEach(e=>{
    if(!e.code)return;
    const tr=document.createElement('tr');if(e.isSun)tr.classList.add('highlight-row');
    let cc,tc;
    if(e.isRest){
      cc=`<span class="shift-code" style="background:rgba(139,144,168,.1);color:var(--text2)">${e.code}</span>`;
      tc=`<span class="tag-rest">${t('rest')}</span>`;
    }else{
      cc=`<span class="shift-code">${e.code}</span>`;
      tc=e.time?`<span class="shift-time">${e.time.replace('-',' → ')}</span>`:`<span style="color:var(--danger);font-size:13px">⚠️ ${e.code} — ${t('unknown')}</span>`;
    }
    tr.innerHTML=`<td><span class="day-num">${String(e.day).padStart(2,'0')}</span></td><td><span class="day-name" style="${e.isSun?'color:var(--danger);font-weight:600':''}">${e.weekday}</span></td><td>${cc}</td><td>${tc}</td>`;
    body.appendChild(tr);
  });
}

// ── EXPORT ────────────────────────────────────────────────────────
function genICS(){
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//EscalaFacil//','CALSCALE:GREGORIAN','METHOD:PUBLISH',`X-WR-CALNAME:Turni ${selectedName}`,'X-WR-TIMEZONE:Europe/Rome'];
  selectedSchedule.filter(e=>e.code&&e.time&&!e.isRest).forEach(e=>{
    const[st,et]=e.time.split('-');const[sh,sm]=st.split(':').map(Number);let[eh,em]=et.split(':').map(Number);
    const sd=new Date(e.year,e.month-1,e.day,sh,sm);let ed=new Date(e.year,e.month-1,e.day,eh,em);
    if(eh<sh||(eh===sh&&em<sm))ed.setDate(ed.getDate()+1);
    const fmt=d=>`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}00`;
    lines.push('BEGIN:VEVENT',`UID:esc-${e.date}-${e.code}@app`,`DTSTART:${fmt(sd)}`,`DTEND:${fmt(ed)}`,`SUMMARY:Turno ${e.code} — ${selectedName}`,`DESCRIPTION:${e.code} ${e.time}`,'BEGIN:VALARM','TRIGGER:-PT30M','ACTION:DISPLAY','DESCRIPTION:Turno','END:VALARM','END:VEVENT');
  });
  lines.push('END:VCALENDAR');return lines.join('\r\n');
}
function exportICS(){
  if(!selectedSchedule.length){showModal(t('attention'),t('noData'));return;}
  const blob=new Blob([genICS()],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`turni_${selectedName.replace(/\s+/g,'_')}.ics`;a.click();URL.revokeObjectURL(url);
  showModal('✅',t('icsOk'));
}
function exportGoogleCalendar(){
  const work=selectedSchedule.filter(e=>e.code&&e.time&&!e.isRest);
  if(!work.length){showModal(t('attention'),t('noData'));return;}
  showModal('Google Calendar',t('gcalMsg').replace('{n}',Math.min(work.length,5)),()=>{
    work.slice(0,5).forEach((e,idx)=>setTimeout(()=>{
      const[st,et]=e.time.split('-');const[sh,sm]=st.split(':').map(Number);let[eh,em]=et.split(':').map(Number);
      const sd=new Date(e.year,e.month-1,e.day,sh,sm);let ed=new Date(e.year,e.month-1,e.day,eh,em);if(eh<sh)ed.setDate(ed.getDate()+1);
      const fmt=d=>d.toISOString().replace(/[-:]/g,'').replace('.000','');
      window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=Turno+${e.code}+-+${encodeURIComponent(selectedName)}&dates=${fmt(sd)}/${fmt(ed)}`,'_blank');
    },idx*500));
    if(work.length>5)showModal('💡',t('gcalTip').replace('{n}',work.length));
  });
}
function copyToClipboard(){
  if(!selectedSchedule.length)return;
  const mv=document.getElementById('scheduleMonth').value||`${new Date().getFullYear()}-${new Date().getMonth()+1}`;
  const[y,m]=mv.split('-').map(Number);const MONTHS=t('months');
  let txt=`TURNI — ${selectedName}\n${MONTHS[m-1]} ${y}\n${'─'.repeat(40)}\n`;
  selectedSchedule.forEach(e=>{if(!e.code)return;txt+=`${String(e.day).padStart(2,'0')} ${e.weekday}  ${e.code}  ${e.isRest?t('rest'):e.time||'?'}\n`;});
  navigator.clipboard.writeText(txt).then(()=>showModal('✅',t('copied'))).catch(()=>showModal('Turni',txt));
}
function printSchedule(){window.print();}

// ── HISTORY ───────────────────────────────────────────────────────
function saveHistory(){
  if(!allNames.length)return;
  const e={id:Date.now(),date:new Date().toLocaleDateString(),names:allNames,month:document.getElementById('scheduleMonth').value,data:rawScheduleData};
  appHistory.unshift(e);if(appHistory.length>10)appHistory.pop();
  localStorage.setItem('escala_history',JSON.stringify(appHistory));renderHistory();
}
function renderHistory(){
  const card=document.getElementById('historyCard');const list=document.getElementById('historyList');
  if(!appHistory.length){card.style.display='none';return;}
  card.style.display='block';list.innerHTML='';
  appHistory.slice(0,5).forEach(e=>{
    const[y,mo]=(e.month||'').split('-');const MONTHS=t('months');const mn=mo?MONTHS[parseInt(mo)-1]:'—';
    const item=document.createElement('div');item.className='history-item';
    item.innerHTML=`<div style="font-size:24px">📋</div><div class="history-info"><div class="history-name">${e.names.slice(0,3).join(', ')}${e.names.length>3?` +${e.names.length-3}`:''}</div><div class="history-meta">${mn} ${y||''} · ${e.date} · ${e.names.length} ${t('workers')}</div></div><button class="btn btn-secondary" style="font-size:12px;padding:6px 12px" onclick="loadHistory(${e.id})">↩</button>`;
    list.appendChild(item);
  });
}
function loadHistory(id){
  const e=appHistory.find(h=>h.id===id);if(!e)return;
  allNames=e.names;rawScheduleData=e.data;
  if(e.month)document.getElementById('scheduleMonth').value=e.month;
  renderNameList();showModal('✅',`${allNames.length} ${t('workers')} ${t('loaded')}. ${t('advanceTo')}`);
}

// ── NAVIGATION ────────────────────────────────────────────────────
function goToStep(step){
  if(step===3)renderNameList();
  if(step===4)buildSchedule();
  if(step===5){
    const c=selectedSchedule.filter(e=>e.code&&e.time&&!e.isRest).length;
    document.getElementById('exportSummary').textContent=`${c} ${t('shifts')} — ${selectedName}`;
  }
  currentStep=step;
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i+1===step));
  renderSteps();
  document.getElementById('progressFill').style.width=(step/5*100)+'%';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── MODAL ─────────────────────────────────────────────────────────
function showModal(title,body,onConfirm){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').textContent=body;
  document.getElementById('modalOverlay').classList.add('open');
  const a=document.getElementById('modalActions');a.innerHTML='';
  if(onConfirm){const b=document.createElement('button');b.className='btn btn-primary';b.textContent=t('confirm');b.onclick=()=>{closeModal();onConfirm();};a.appendChild(b);}
  const cb=document.createElement('button');cb.className='btn btn-secondary';cb.textContent=t('close');cb.onclick=closeModal;a.appendChild(cb);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
</script>
